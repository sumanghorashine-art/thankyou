<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONGRATS 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 30% 40%, #1e0845 0%, #0d0221 60%, #020010 100%);
      cursor: none;
      font-family: 'Boogaloo', cursive;
    }
    #bgCanvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
    #hero {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      user-select: none;
    }
    .thank {
      font-family: 'Pacifico', cursive;
      font-size: clamp(4rem, 14vw, 11rem);
      line-height: 1;
      background: linear-gradient(135deg, #ffe156 0%, #ff6ef7 40%, #43e8ff 80%, #a8ff78 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(255,110,247,0.55)) drop-shadow(0 0 80px rgba(67,232,255,0.3));
      animation: pulse 3s ease-in-out infinite;
      text-align: center;
    }
    .you {
      font-family: 'Pacifico', cursive;
      font-size: clamp(3rem, 12vw, 9.5rem);
      line-height: 1;
      background: linear-gradient(135deg, #43e8ff 0%, #a8ff78 50%, #ffe156 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(67,232,255,0.6)) drop-shadow(0 0 80px rgba(168,255,120,0.3));
      animation: pulse 3s ease-in-out infinite reverse;
      text-align: center;
    }
    .subtitle {
      margin-top: 1.6rem;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      animation: fadein 2s 0.8s both;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadein {
      from { opacity:0; transform: translateY(12px); }
      to { opacity:1; transform: translateY(0); }
    }
    .emoji {
      position: fixed;
      z-index: 5;
      font-size: 2rem;
      pointer-events: none;
      will-change: transform;
      transition: filter 0.1s;
    }
    #cursor {
      position: fixed; z-index: 999;
      width: 48px; height: 48px;
      margin: -24px 0 0 -24px;
      font-size: 2rem;
      line-height: 48px;
      text-align: center;
      pointer-events: none;
      transition: transform 0.08s ease;
      filter: drop-shadow(0 0 8px #ff6ef7);
    }
    .burst {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      font-size: 2.2rem;
      animation: burst 0.6s ease-out forwards;
    }
    @keyframes burst {
      0% { opacity:1; transform: translate(var(--tx),var(--ty)) scale(0.3); }
      50% { opacity:1; }
      100% { opacity:0; transform: translate(var(--tx2),var(--ty2)) scale(1.4); }
    }
    .ripple {
      position: fixed; z-index: 4;
      border-radius: 50%;
      pointer-events: none;
      border: 3px solid rgba(255,110,247,0.7);
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      animation: ripple 0.7s ease-out forwards;
    }
    @keyframes ripple {
      to { width: 140px; height: 140px; margin: -70px 0 0 -70px; opacity: 0; }
    }
    #aurora {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(ellipse 80% 50% at 20% 60%, #ff6ef7, transparent),
        radial-gradient(ellipse 60% 40% at 80% 30%, #43e8ff, transparent),
        radial-gradient(ellipse 70% 45% at 55% 80%, #a8ff78, transparent);
      animation: aurora 8s ease-in-out infinite alternate;
    }
    @keyframes aurora {
      0% { filter: blur(60px) hue-rotate(0deg); }
      100% { filter: blur(80px) hue-rotate(40deg); }
    }
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="aurora"></div>
<div id="hero">
  <div class="thank">Thank</div>
  <div class="you">You!</div>
  <div class="subtitle">✨ Move your mouse · Click anywhere ✨</div>
</div>
<div id="cursor">🌟</div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────
const EMOJIS = [
  '🎉','🎊','✨','💖','🌟','🥳','💫','🎈','🦋','🌈','🎁','🏆','💐','🌸','🎀','💝','🔥','⭐','🌺','🎶',
  '💯','🙌','👑','🍀','🎠','🦄','🌙','☀️','🌊','💎','🚀','🍾','🕺','💃','🎤','🎸','🏅','❤️','🧡','💛',
  '💚','💙','💜','🎇','🎆','🪩','🍄','🦩','🍭','🌸','🐙','💥','🌈','🍾','🕺','🦄','🌟'
];

const PARTICLE_COUNT = 180;
const MOUSE_RADIUS = 240;
const MOUSE_STRENGTH = 0.09;

// ─── STARS BACKGROUND ─────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const ctx = bgCanvas.getContext('2d');
let stars = [];
function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
function initStars() {
  stars = Array.from({length: 220}, () => ({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    r: Math.random() * 1.6 + 0.3,
    alpha: Math.random(),
    speed: Math.random() * 0.006 + 0.002,
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  stars.forEach(s => {
    s.alpha += s.speed;
    if (s.alpha > 1) s.speed *= -1;
    if (s.alpha < 0) { s.speed *= -1; s.alpha = 0; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(2)})`;
    ctx.fill();
  });
}
resizeBg(); initStars();
window.addEventListener('resize', () => { resizeBg(); initStars(); });

// ─── EMOJI PARTICLES ──────────────────────────────────────────
const W = () => window.innerWidth;
const H = () => window.innerHeight;

let particles = Array.from({length: PARTICLE_COUNT}, (_, i) => createParticle());

function createParticle(x = null, y = null) {
  const el = document.createElement('div');
  el.className = 'emoji';
  el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  document.body.appendChild(el);
  
  const size = 1.1 + Math.random() * 2.9;
  el.style.fontSize = size + 'rem';

  return {
    el,
    x: x !== null ? x : Math.random() * W(),
    y: y !== null ? y : Math.random() * H(),
    vx: (Math.random() - 0.5) * 4.2,
    vy: (Math.random() - 0.5) * 4.2 - 0.3,
    rot: Math.random() * 360,
    rotSpeed: (Math.random() - 0.5) * 5.5,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.04 + Math.random() * 0.06,
    scale: 1,
  };
}

// ─── MOUSE ────────────────────────────────────────────────────
let mx = W() / 2, my = H() / 2;
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

const cursorEmojis = ['🌟','✨','💫','⭐','🌈','🔥','💖','🦄','🎉','🪩'];
let cursorIdx = 0;
setInterval(() => {
  cursorIdx = (cursorIdx + 1) % cursorEmojis.length;
  cursor.textContent = cursorEmojis[cursorIdx];
}, 420);

// ─── CLICK — Now adds permanent floating emojis ───────────────
document.addEventListener('click', e => {
  const cx = e.clientX;
  const cy = e.clientY;

  // Ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = cx + 'px';
  ripple.style.top = cy + 'px';
  document.body.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  // Temporary sparkle burst
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const angle = (i / 12) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
    const dist = 60 + Math.random() * 100;
    b.style.left = cx + 'px';
    b.style.top = cy + 'px';
    b.style.setProperty('--tx', `${Math.cos(angle) * dist * 0.4}px`);
    b.style.setProperty('--ty', `${Math.sin(angle) * dist * 0.4}px`);
    b.style.setProperty('--tx2', `${Math.cos(angle) * dist * 1.2}px`);
    b.style.setProperty('--ty2', `${Math.sin(angle) * dist * 1.2}px`);
    document.body.appendChild(b);
    b.addEventListener('animationend', () => b.remove());
  }

  // Add permanent new emojis that join the floating group
  const newCount = 8; // You can increase this for even more chaos
  for (let i = 0; i < newCount; i++) {
    const angle = (i / newCount) * Math.PI * 2 + (Math.random() - 0.5) * 1.2;
    const speed = 3.5 + Math.random() * 4.5;
    
    const p = createParticle(cx, cy);
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed - 1.5; // slight upward bias
    p.rotSpeed *= 1.3;
    particles.push(p);
  }
});

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop() {
  drawStars();
  const w = W(), h = H();

  particles.forEach(p => {
    const dx = p.x - mx;
    const dy = p.y - my;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < MOUSE_RADIUS) {
      const force = (1 - dist / MOUSE_RADIUS) * MOUSE_STRENGTH * 15;
      p.vx += (dx / dist) * force;
      p.vy += (dy / dist) * force;
    }

    p.vx *= 0.962;
    p.vy *= 0.962;

    p.wobble += p.wobbleSpeed;
    p.x += p.vx + Math.sin(p.wobble) * 0.85;
    p.y += p.vy + Math.cos(p.wobble * 0.75) * 0.75;
    p.rot += p.rotSpeed;

    // Wrap around
    if (p.x < -120) p.x = w + 120;
    if (p.x > w + 120) p.x = -120;
    if (p.y < -120) p.y = h + 120;
    if (p.y > h + 120) p.y = -120;

    const targetScale = dist < MOUSE_RADIUS ? 1 + (1 - dist/MOUSE_RADIUS) * 1.5 : 1;
    p.scale += (targetScale - p.scale) * 0.13;

    p.el.style.transform =
      `translate(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px) rotate(${p.rot.toFixed(1)}deg) scale(${p.scale.toFixed(3)})`;
  });
  requestAnimationFrame(loop);
}
loop();

// ─── TOUCH SUPPORT ────────────────────────────────────────────
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
}, {passive: true});

document.addEventListener('touchstart', e => {
  document.dispatchEvent(new MouseEvent('click', {
    clientX: e.touches[0].clientX,
    clientY: e.touches[0].clientY
  }));
}, {passive: true});
</script>
</body>
</html>
