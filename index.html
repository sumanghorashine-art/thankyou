<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONGRATS 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1: #0d0221;
      --bg2: #130535;
      --glow1: #ff6ef7;
      --glow2: #43e8ff;
      --glow3: #ffe156;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at 30% 40%, #1e0845 0%, #0d0221 60%, #020010 100%);
      cursor: none;
      font-family: 'Boogaloo', cursive;
    }

    /* ── canvas background ── */
    #bgCanvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── hero text ── */
    #hero {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      user-select: none;
    }

    .thank {
      font-family: 'Pacifico', cursive;
      font-size: clamp(4rem, 14vw, 11rem);
      line-height: 1;
      background: linear-gradient(135deg, #ffe156 0%, #ff6ef7 40%, #43e8ff 80%, #a8ff78 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(255,110,247,0.55)) drop-shadow(0 0 80px rgba(67,232,255,0.3));
      animation: pulse 3s ease-in-out infinite;
      text-align: center;
    }

    .you {
      font-family: 'Pacifico', cursive;
      font-size: clamp(3rem, 12vw, 9.5rem);
      line-height: 1;
      background: linear-gradient(135deg, #43e8ff 0%, #a8ff78 50%, #ffe156 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(67,232,255,0.6)) drop-shadow(0 0 80px rgba(168,255,120,0.3));
      animation: pulse 3s ease-in-out infinite reverse;
      text-align: center;
    }

    .subtitle {
      margin-top: 1.6rem;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      animation: fadein 2s 0.8s both;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }
    @keyframes fadein {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── emoji particles ── */
    .emoji {
      position: fixed;
      z-index: 5;
      font-size: 2rem;
      pointer-events: none;
      will-change: transform;
      transition: filter 0.1s;
    }

    /* ── custom cursor ── */
    #cursor {
      position: fixed; z-index: 999;
      width: 48px; height: 48px;
      margin: -24px 0 0 -24px;
      font-size: 2rem;
      line-height: 48px;
      text-align: center;
      pointer-events: none;
      transition: transform 0.08s ease;
      filter: drop-shadow(0 0 8px #ff6ef7);
    }

    /* ── sparkle burst on click ── */
    .burst {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      font-size: 2rem;
      animation: burst 0.7s ease-out forwards;
    }
    @keyframes burst {
      0%   { opacity:1; transform: translate(var(--tx),var(--ty)) scale(0.2); }
      60%  { opacity:1; }
      100% { opacity:0; transform: translate(var(--tx2),var(--ty2)) scale(1.2); }
    }

    /* ── ripple ring on click ── */
    .ripple {
      position: fixed; z-index: 4;
      border-radius: 50%;
      pointer-events: none;
      border: 3px solid rgba(255,110,247,0.7);
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      animation: ripple 0.7s ease-out forwards;
    }
    @keyframes ripple {
      to { width: 120px; height: 120px; margin: -60px 0 0 -60px; opacity: 0; }
    }

    /* ── aurora ── */
    #aurora {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(ellipse 80% 50% at 20% 60%, #ff6ef7, transparent),
        radial-gradient(ellipse 60% 40% at 80% 30%, #43e8ff, transparent),
        radial-gradient(ellipse 70% 45% at 55% 80%, #a8ff78, transparent);
      animation: aurora 8s ease-in-out infinite alternate;
    }
    @keyframes aurora {
      0%   { filter: blur(60px) hue-rotate(0deg); }
      100% { filter: blur(80px) hue-rotate(40deg); }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="aurora"></div>

<div id="hero">
  <div class="thank">Thank</div>
  <div class="you">You!</div>
  <div class="subtitle">✨ Move your mouse · Click anywhere ✨</div>
</div>

<div id="cursor">🌟</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const EMOJIS = [
  '🎉','🎊','✨','💖','🌟','🥳','💫','🎈','🦋','🌈',
  '🎁','🏆','💐','🌸','🎀','💝','🔥','⭐','🌺','🎶',
  '💯','🙌','👑','🍀','🎠','🦄','🌙','☀️','🌊','💎',
  '🎉','🎊','✨','💖','🌟','🥳','💫','🎈','🦋','🌈',
  '🎁','🏆','💐','🌸','🎀','💝','🔥','⭐','🌺','🎶',
  '💯','🙌','👑','🍀','🎠','🦄','🌙','☀️','🌊','💎',
  '🎉','🎊','✨','💖','🌟','🥳','💫','🎈','🦋','🌈',
  '🎁','🏆','💐','🌸','🎀','💝','🔥','⭐','🌺','🎶',
  '💯','🙌','👑','🍀','🎠','🦄','🌙','☀️','🌊','💎'
];
const PARTICLE_COUNT = 55;
const MOUSE_RADIUS   = 180;
const MOUSE_STRENGTH = 0.06;

// ─── STARS BACKGROUND ─────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const ctx = bgCanvas.getContext('2d');
let stars = [];

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}

function initStars() {
  stars = Array.from({length: 180}, () => ({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    r: Math.random() * 1.4 + 0.3,
    alpha: Math.random(),
    speed: Math.random() * 0.004 + 0.002,
  }));
}

function drawStars() {
  ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  stars.forEach(s => {
    s.alpha += s.speed;
    if (s.alpha > 1) s.speed *= -1;
    if (s.alpha < 0) { s.speed *= -1; s.alpha = 0; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(2)})`;
    ctx.fill();
  });
}

resizeBg(); initStars();
window.addEventListener('resize', () => { resizeBg(); initStars(); });

// ─── EMOJI PARTICLES ──────────────────────────────────────────
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const particles = Array.from({length: PARTICLE_COUNT}, (_, i) => {
  const el = document.createElement('div');
  el.className = 'emoji';
  el.textContent = EMOJIS[i % EMOJIS.length];
  document.body.appendChild(el);

  const size = 1.2 + Math.random() * 2.2;
  el.style.fontSize = size + 'rem';

  return {
    el,
    x: Math.random() * W(),
    y: Math.random() * H(),
    vx: (Math.random() - 0.5) * 1.1,
    vy: (Math.random() - 0.5) * 1.1 - 0.25,
    size,
    rot: Math.random() * 360,
    rotSpeed: (Math.random() - 0.5) * 1.5,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.03,
    scale: 1,
  };
});

// ─── MOUSE ────────────────────────────────────────────────────
let mx = W() / 2, my = H() / 2;
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

const cursorEmojis = ['🌟','✨','💫','⭐','🌈','🔥','💖','🌟','✨','💫','⭐','🌈','🔥','💖','🌟','✨','💫','⭐','🌈','🔥','💖','🌟','✨','💫','⭐','🌈','🔥','💖'];
let cursorIdx = 0;
setInterval(() => {
  cursorIdx = (cursorIdx + 1) % cursorEmojis.length;
  cursor.textContent = cursorEmojis[cursorIdx];
}, 600);

// ─── CLICK BURST ──────────────────────────────────────────────
document.addEventListener('click', e => {
  // ripple
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = e.clientX + 'px';
  ripple.style.top  = e.clientY + 'px';
  document.body.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  // emoji burst
  const count = 10;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const angle = (i / count) * Math.PI * 2;
    const dist  = 60 + Math.random() * 80;
    b.style.left = e.clientX + 'px';
    b.style.top  = e.clientY + 'px';
    b.style.setProperty('--tx',  `${Math.cos(angle)*dist*0.3}px`);
    b.style.setProperty('--ty',  `${Math.sin(angle)*dist*0.3}px`);
    b.style.setProperty('--tx2', `${Math.cos(angle)*dist}px`);
    b.style.setProperty('--ty2', `${Math.sin(angle)*dist}px`);
    document.body.appendChild(b);
    b.addEventListener('animationend', () => b.remove());
  }
});

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop() {
  drawStars();

  const w = W(), h = H();

  particles.forEach(p => {
    // mouse repulsion / attraction
    const dx = p.x - mx;
    const dy = p.y - my;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < MOUSE_RADIUS) {
      const force = (1 - dist / MOUSE_RADIUS) * MOUSE_STRENGTH * 12;
      p.vx += (dx / dist) * force;
      p.vy += (dy / dist) * force;
    }

    // damping
    p.vx *= 0.985;
    p.vy *= 0.985;

    // gentle gravity back toward center
    p.vx += (w/2 - p.x) * 0.00008;
    p.vy += (h/2 - p.y) * 0.00008;

    // wobble
    p.wobble += p.wobbleSpeed;
    p.x += p.vx + Math.sin(p.wobble) * 0.4;
    p.y += p.vy + Math.cos(p.wobble * 0.7) * 0.3;

    p.rot += p.rotSpeed;

    // wrap around edges
    if (p.x < -60)  p.x = w + 60;
    if (p.x > w+60) p.x = -60;
    if (p.y < -60)  p.y = h + 60;
    if (p.y > h+60) p.y = -60;

    // scale pop near mouse
    const targetScale = dist < MOUSE_RADIUS ? 1 + (1 - dist/MOUSE_RADIUS) * 1.2 : 1;
    p.scale += (targetScale - p.scale) * 0.1;

    p.el.style.transform =
      `translate(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px) rotate(${p.rot.toFixed(1)}deg) scale(${p.scale.toFixed(3)})`;
  });

  requestAnimationFrame(loop);
}

loop();

// ─── TOUCH SUPPORT ────────────────────────────────────────────
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
}, {passive: true});

document.addEventListener('touchstart', e => {
  document.dispatchEvent(new MouseEvent('click', {
    clientX: e.touches[0].clientX,
    clientY: e.touches[0].clientY
  }));
}, {passive: true});
</script>
</body>
</html>
